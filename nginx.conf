server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location ~* \.js$ {
        types {
            application/javascript js;
        }
        try_files $uri $uri/ /index.html;
    }
    
    # CSS 파일에 대한 MIME 타입 명시적 설정
    location ~* \.css$ {
        types {
            text/css css;
        }
        try_files $uri $uri/ /index.html;
    }
    
    location /team5 {
        alias /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
    
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}
