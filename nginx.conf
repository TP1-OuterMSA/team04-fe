server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /team4/assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri =404;  # 파일이 없으면 404 반환
    }

    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri =404;
    }
    
    location /team4 {
        alias /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
}
